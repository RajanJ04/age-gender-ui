<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age & Gender Detection</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        margin: 15px 0;
    }

    button {
        background: #667eea;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #5a67d8;
    }

    #result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: #444;
    }

    img {
        margin-top: 15px;
        width: 100%;
        border-radius: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>👤 Age & Gender</h1>

    <input type="file" id="imageInput">
    <br>
    <button onclick="uploadImage()">Detect</button>

    <img id="preview" style="display:none;">
    <div id="result"></div>
</div>

<script>
function uploadImage() {
    const fileInput = document.getElementById("imageInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select an image");
        return;
    }

    // Show preview
    const preview = document.getElementById("preview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";

    const formData = new FormData();
    formData.append("image", file);

    fetch("https://age-gender-detection-2.onrender.com/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            `Gender: ${data.gender} <br> Age: ${data.age}`;
    })
    .catch(err => {
        document.getElementById("result").innerHTML = "Error connecting to API";
    });
}
</script>

</body>
</html>
